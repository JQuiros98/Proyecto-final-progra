<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Listado de Categorias</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

    <div class="container mt-5">
        <div class="card shadow p-4">
            <div class="mb-3">
                <a href="main.html" class="btn btn-secondary">← Volver</a>
            </div>

            <h1 class="text-center mb-3">Listado de Categorias</h1>

            <p class="text-center">Consulta las categorias registradas o busca una categoria por nombre.</p>

            <div class="row g-2 mb-4">
                <div class="col-md-8">
                    <input type="text" id="txtFiltro" class="form-control" placeholder="Buscar categoria...">
                </div>

                <div class="col-md-2">
                    <button id="btnFiltrar" class="btn btn-primary w-100">Filtrar</button>
                </div>

                <div class="col-md-2">
                    <button id="btnMostrarTodo" class="btn btn-secondary w-100">Mostrar todo</button>
                </div>
            </div>

            <div class="table-responsive">
                <table class="table table-bordered table-hover align-middle">
                    <thead class="table-dark">
                        <tr>
                            <th>Nombre</th>
                            <th>Descripcion</th>
                        </tr>
                    </thead>
                    <tbody id="tbodyCategorias"></tbody>
                </table>
            </div>
        </div>
    </div>

    <script src="listar-categorias.js"></script>

</body>
</html>
