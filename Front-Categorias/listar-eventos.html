<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Eventos</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="css/main.css">
</head>

<body class="eventos-page">

<nav class="navbar navbar-dark bg-dark mb-4">
  <div class="container">
    <span class="navbar-brand">Sistema de Eventos</span>
  </div>
</nav>

<div class="container">

  <div class="d-flex justify-content-between align-items-center mb-4">
    <a href="main.html" class="btn btn-secondary">← Volver</a>
    <h2 class="fw-bold titulo-eventos mb-0">Lista de Eventos</h2>
    <a href="registrar-evento.html" class="btn btn-success">+ Nuevo Evento</a>
  </div>

  <div class="card shadow-sm p-3 mb-4">
    <div class="row g-2">
      <div class="col-md-4">
        <input type="date" id="filtroFecha" class="form-control">
      </div>

      <div class="col-md-4">
        <select id="filtroEstado" class="form-select">
          <option value="">Todos los estados</option>
          <option value="activo">Activo</option>
          <option value="cancelado">Cancelado</option>
        </select>
      </div>

      <div class="col-md-2">
        <button class="btn btn-primary w-100" onclick="filtrarEventos()">Filtrar</button>
      </div>

      <div class="col-md-2">
        <button class="btn btn-outline-secondary w-100" onclick="limpiarFiltros()">Limpiar</button>
      </div>
    </div>
  </div>

  <div class="row" id="lista"></div>
  <div id="detalle" class="mt-4"></div>

</div>

<script src="listar-eventos.js"></script>
</body>
</html>
