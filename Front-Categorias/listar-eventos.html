<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Eventos</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">

<div class="container mt-5">

  <!-- BOTÓN NUEVO EVENTO -->
  <div class="d-flex justify-content-between mb-3">
    <a href="main.html" class="btn btn-secondary">← Volver</a>
    <a href="registrar-evento.html" class="btn btn-success">+ Nuevo Evento</a>
  </div>

  <h2 class="text-center mb-4">Lista de Eventos</h2>

  <!-- FILTROS -->
  <div class="row mb-4">

    <!-- FECHA -->
    <div class="col-md-3">
      <input type="date" id="filtroFecha" class="form-control">
    </div>

    <!-- ESTADO -->
    <div class="col-md-3">
      <select id="filtroEstado" class="form-control">
        <option value="">Todos</option>
        <option value="activo">Activo</option>
        <option value="cancelado">Cancelado</option>
      </select>
    </div>

    <!-- BOTONES -->
    <div class="col-md-2">
      <button class="btn btn-primary w-100" onclick="filtrarEventos()">Filtrar</button>
    </div>

    <div class="col-md-2">
      <button class="btn btn-secondary w-100" onclick="cargarEventos()">Limpiar</button>
    </div>

  </div>

  <!-- LISTA -->
  <div class="row" id="lista"></div>

  <!-- DETALLE -->
  <div id="detalle" class="mt-4"></div>

</div>

<script src="listar-eventos.js"></script>
</body>
</html>
