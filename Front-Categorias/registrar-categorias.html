<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registrar Categoria</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

    <div class="container mt-5">
        <div class="card shadow p-4">
            <div class="mb-3">
                <a href="listar-categorias.html" class="btn btn-secondary">← Volver</a>
            </div>

            <h1 class="text-center mb-3">Registro de Categorias</h1>

            <p class="text-center">¿Deseas registrar una nueva categoria? Completa la siguiente informacion:</p>

            <form>
                <div class="mb-3">
                    <label for="txtNombre" class="form-label">Nombre de la categoria:</label>
                    <input type="text" id="txtNombre" class="form-control" placeholder="Ej: Tecnologia">
                </div>

                <div class="mb-3">
                    <label for="txtDescripcion" class="form-label">Descripcion:</label>
                    <input type="text" id="txtDescripcion" class="form-control" placeholder="Ej: Productos tecnologicos">
                </div>

                <button type="button" id="btnRegistrar" class="btn btn-primary w-100">
                    Registrar Categoria
                </button>
            </form>

            <div id="mensaje" class="mt-3"></div>
        </div>
    </div>

<script src="registrar-categorias.js"></script>

</body>
</html>
