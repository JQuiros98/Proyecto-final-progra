<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Registrar Evento</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">

<div class="container mt-5">
  <div class="card shadow p-4">

    <!-- BOTÓN VOLVER -->
    <div class="mb-3">
      <a href="listar-eventos.html" class="btn btn-secondary">← Volver</a>
    </div>

    <h2 class="text-center mb-4">Registrar Evento</h2>

    <form id="formEvento">

      <!-- NOMBRE -->
      <div class="mb-3">
        <input type="text" id="nombre" class="form-control" placeholder="Nombre del evento" required>
      </div>

      <!-- FECHA -->
      <div class="mb-3">
        <input type="date" id="fecha" class="form-control" required>
      </div>

      <!-- UBICACIÓN -->
      <div class="mb-3">
        <input type="text" id="ubicacion" class="form-control" placeholder="Ubicación">
      </div>

      <!-- ESTADO -->
      <div class="mb-3">
        <select id="estado" class="form-control">
          <option value="activo">Activo</option>
          <option value="cancelado">Cancelado</option>
        </select>
      </div>

      <!-- BOTÓN -->
      <button type="submit" class="btn btn-primary w-100">
        Guardar Evento
      </button>

    </form>

    <!-- MENSAJES -->
    <div id="mensaje" class="mt-3 text-center"></div>

  </div>
</div>

<script src="registrar-eventos.js"></script>
</body>
</html>
